name: supersave
description: SuperSave — Personal Finance Manager for iOS, Android, and Web.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # Navigation
  go_router: ^13.2.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6

  # UI
  google_fonts: ^6.2.1

  # HTTP & storage
  http: ^1.2.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
